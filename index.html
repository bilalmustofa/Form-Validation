<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Form Validation</title>
  </head>
  <body>
    <div class="container">
      <h1 class="title">Form Validation</h1>
      <div>
        <form action="">

          <!-- full name -->
          <div class="full-name">
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" placeholder="Enter Full Name"/>
            <p class="msg" id="fullNameMsg">fill full name</p>
          </div>

          <!-- email name -->
          <div class="email">
            <label for="email">Email:</label>
            <input type="text" id="email" placeholder="Enter email "/>
            <p class="msg" id="emailMsg">fill email</p>
          </div>

          <!-- phone number -->
          <div class="phone-number">
            <label for="phonenumber">Phone Number:</label>
            <input type="number" id="phonenumber" placeholder="Enter Phone Number"/>
            <p class="msg" id="phonenumberMsg">small phone number</p>
          </div>

          <!-- password -->
          <div class="password">
            <label for="password">Password:</label>
            <div class="password-box">
              <input type="password" id="password" placeholder="Enter Your Password"/>
              <i class="fa-solid fa-eye-slash eyeIcon" id="eyeIconPassword"></i>
            </div>
            <p class="msg" id="passwordMsg">password is</p>

            <!-- password strength parameter -->
            <div class="password-strength">
              <!-- at lest 8 char -->
              <div class="length">
                <i class="fa-solid fa-xmark" id="lengthParameter"></i>
                <span>At least 8 characters</span>
              </div>
              <!-- upper case -->
              <div class="upperCase">
                <i class="fa-solid fa-xmark" id="uppercaseParameter"></i>
                <span>At least 1 uppercase letter</span>
              </div>
              <!-- lowercase -->
              <div class="lowercase">
                <i class="fa-solid fa-xmark" id="lowercaseParameter"></i>
                <span>At least 1 lowercase letter</span>
              </div>
              <!-- number -->
              <div class="number">
                <i class="fa-solid fa-xmark" id="numberParameter"></i>
                <span>At least 1 number</span>
              </div>
              <!-- spacial char -->
              <div class="parameter-item" id="specialParameter">
                <i class="fa-solid fa-xmark" id="specialIcon"></i>
                <span>At least 1 special character</span>
              </div>
            </div>
          </div>
          
          <!-- password conformation -->
          <div class="confirm">
            <label for="confirmPassword">Confirm Password:</label>
            <div class="confirm-pass-box">
              <input type="password" id="confirmPassword" placeholder="Confirm Password"/>
              <i class="fa-solid fa-eye-slash eyeIcon" id="eyeIconConfirm"></i>
            </div>
            <p class="msg" id="confirmMsg">confirm password</p>
          </div>

          <!-- submit button -->
           <button type="button" class="submit-btn">Submit</button>
        </form>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
