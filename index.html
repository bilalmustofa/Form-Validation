<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Form Validation</title>
  </head>
  <body>
    <div class="container">
      <h1 class="title">Form Validation</h1>
      <div>
        <form action="#">
          <div class="first-name">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" />
            <p id="firstNameMsg">fill fist name</p>
          </div>
          <div class="last-name">
            <label for="laststName">Last Name</label>
            <input type="text" id="laststName" />
            <p id="lastNameMsg">fill last name</p>
          </div>
          <div class="phone-number">
            <label for="phonenumber">Phone Number</label>
            <input type="number" id="phonenumber" />
            <p id="phonenumberMsg">small phone number</p>
          </div>
          <div class="password">
            <label for="password">Password</label>
            <input type="password" id="password" />
            <i class="fa-solid fa-eye-slash" id="eyeIconPassword"></i>
            <p id="passwordMsg">password is</p>
            <div class="password-strength">
              <!-- at lest 8 char -->
              <div class="length">
                <i class="fa-solid fa-xmark" id="lengthParameter"></i>
                <span>At least 8 characters</span>
              </div>
              <!-- upper case -->
              <div class="upperCase">
                <i class="fa-solid fa-xmark" id="uppercaseParameter"></i>
                <span>At least 1 uppercase letter</span>
              </div>
              <div class="lowercase">
                <i class="fa-solid fa-xmark" id="lowercaseParameter"></i>
                <span>At least 1 lowercase letter</span>
              </div>
              <div class="number">
                <i class="fa-solid fa-xmark" id="numberParameter"></i>
                <span>At least 1 number</span>
              </div>
              <div class="parameter-item" id="specialParameter">
                <i class="fa-solid fa-xmark" id="specialIcon"></i>
                <span>At least 1 special character</span>
              </div>
            </div>
          </div>
          <div class="confirm">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword">
            <i class="fa-solid fa-eye-slash" id="eyeIconConfirm"></i>
            <p id="confirmMsg">confirm password</p>
          </div>
        </form>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
